<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mori Market</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" data-testid="app-shell" aria-label="Mori Market">
      <div class="status-space" aria-hidden="true"><span>10:08</span><span class="status-icons">◒　◖　⌁　▮▮　60</span></div>

      <nav class="top-tabs" aria-label="Shop sections">
        <button type="button">Following</button>
        <button type="button" class="active">For you</button>
        <button type="button">Fast finds</button>
        <button type="button">Local</button>
        <button type="button">Style</button>
        <button type="button">Travel</button>
      </nav>

      <section class="search-zone" aria-label="Search marketplace">
        <button class="scan" type="button" aria-label="Scan code"><i></i><i></i><i></i><i></i></button>
        <input id="search" data-testid="search-input" aria-label="Search recommendations" type="search" placeholder="Find something useful" autocomplete="off" />
        <button class="camera" type="button" aria-label="Image search">⌾</button>
        <button class="search-button" type="button">Search</button>
      </section>

      <section class="quick-actions" aria-label="Quick actions">
        <button type="button" class="quick" data-filter="rewards"><span class="quick-icon red">¥</span><b>Daily rewards</b></button>
        <button type="button" class="quick" data-filter="trial"><span class="quick-icon pink">∪</span><b>Try first</b></button>
        <button type="button" class="quick" data-filter="coins"><span class="quick-icon gold">m</span><b>Token market</b></button>
        <button type="button" class="quick" data-filter="work"><span class="quick-icon coral">⌄</span><b>Maker hub</b></button>
        <button type="button" class="quick" data-filter="station"><span class="quick-icon blue">▣</span><b>Parcel station</b></button>
        <button type="button" class="quick" data-filter="home"><span class="quick-icon green">♣</span><b>Home garden</b></button>
        <button type="button" class="quick" data-filter="food"><span class="quick-icon yellow">●</span><b>Food lane</b></button>
        <button type="button" class="quick" data-filter="world"><span class="quick-icon purple">➤</span><b>World shop</b></button>
        <button type="button" class="quick" data-filter="flash"><span class="quick-icon orange">◫</span><b>Flash shelf</b></button>
        <button type="button" class="quick" data-filter="events"><span class="quick-icon rose">▣</span><b>Event book</b></button>
      </section>

      <div class="pager" aria-hidden="true"><span></span><i></i></div>

      <section class="promo-row" aria-label="Featured promotions">
        <article class="promo food-promo"><h2>Live kitchen <em>now</em></h2><div class="art sandwich-art" aria-hidden="true"><span></span><i></i><b></b></div><p>member tasting</p></article>
        <article class="promo controller-promo"><h2>Maker support <em>save more</em></h2><div class="art controller-art" aria-hidden="true"><i></i><i></i><b>✚</b><b>●</b></div><p>weekly pick</p></article>
        <article class="promo robot-promo"><h2>Minute deal <em>ending soon</em></h2><div class="art robot-art" aria-hidden="true"><div><span>••</span></div><i></i><i></i></div><p>fast pick</p></article>
      </section>

      <aside class="notice" aria-label="Promotion announcement"><span class="speaker">◖</span><strong>Summer club</strong><span>Fresh picks, small surprises</span><button type="button">Claim gift</button></aside>

      <section class="recommendations" aria-label="Recommendations">
        <div class="section-heading"><h1>Picked for your space</h1><button type="button" id="clear-filter" hidden>Show all</button></div>
        <div class="recommendation-list" data-testid="recommendation-list" aria-live="polite"></div>
        <p class="empty-state" hidden>No picks match that search. Try another word.</p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button type="button" class="nav-item selected"><span class="nav-logo">M</span><small>Home</small></button>
      <button type="button" class="nav-item"><span class="nav-symbol">▻</span><small>Clips</small></button>
      <button type="button" class="nav-item"><span class="nav-symbol message">◌<i>12</i></span><small>Notes</small></button>
      <button type="button" class="nav-item cart"><span class="nav-symbol">⌑<b data-testid="cart-count">0</b></span><small>Cart</small></button>
      <button type="button" class="nav-item"><span class="nav-symbol">☺</span><small>Me</small></button>
    </nav>
    <output id="qa-result" data-testid="qa-result" hidden></output>
    <script src="app.js"></script>
  </body>
</html>
